<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Birra - Beer Tasting Club</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="/Beer-Tasting-Club/manifest.json">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="assets/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>

<body>
    <div class="container">
        <div class="header-bar">
            <a href="miebirre.html" class="header-link">
                <span class="material-symbols-outlined">arrow_back</span> Mie Birre
            </a>
            <img src="assets/logo.png" alt="Logo" class="header-logo">
        </div>

        <div id="beer-detail-container">
            <p style="text-align:center;">Caricamento...</p>
        </div>

        <div class="linked-sheets">
            <h3 style="border-bottom: 1px solid #4b5563; padding-bottom: 10px;">Schede di Degustazione Ricevute</h3>
            <div id="sheets-list">
                <p style="color: var(--text-muted); font-size: 0.9em; margin-top: 10px;">
                    Nessuna scheda collegata a questa birra.
                </p>
            </div>
        </div>
    </div>

    <footer style="text-align: center; margin-top: 40px; font-size: 1rem; color: #4b5563;">
        &copy; 2026 Beer Tasting Club <span class="footer-ver" id="footer-version">v...</span><br>
        <a href="privacy.html" style="color: inherit; text-decoration: underline;">Info Privacy e Cookie</a>
        <p
            style="text-align: center; margin-top: 5px; font-size: 0.7rem; color: #4b5563; display: flex; align-items: center; justify-content: center; gap: 4px;">
            Crafted with love by <a href="https://www.linkedin.com/in/mirko-caiani/" target="_blank" rel="noopener noreferrer"
                style="color: inherit; text-decoration: underline;">Mirko Caiani</a>
        </p>
    </footer>

    <script type="module">
        import { supabase } from './js/supabase-config.js';
        import { APP_VERSION } from './js/config.js';
        import { showModal } from './js/modal.js';
        import { initPWA } from './js/pwa-updater.js';

        const footerVer = document.getElementById('footer-version');
        if (footerVer) footerVer.textContent = ` v${APP_VERSION}`;

        initPWA();

        const params = new URLSearchParams(window.location.search);
        const beerId = params.get('id');

        if (!beerId) window.location.href = 'miebirre.html';

        window.copySharingId = async (id) => {
            await navigator.clipboard.writeText(id);
            await showModal("Copiato!", "Codice copiato negli appunti.", "success", "content_copy");
        };

        async function loadData() {
            document.getElementById('beer-detail-container').innerHTML = `<div class="skeleton" style="height: 250px; border-radius: 8px;"></div>`;
            document.getElementById('sheets-list').innerHTML = `<div class="skeleton" style="height: 100px; border-radius: 8px;"></div>`;
            const { data: beer, error } = await supabase
                .from('my_beers')
                .select('*')
                .eq('id', beerId)
                .single();

            if (error) {
                document.getElementById('beer-detail-container').innerHTML = `<p style="color:red">Errore: ${error.message}</p>`;
                return;
            }

            const packMap = { 'bottle': 'Bottiglia', 'can': 'Lattina', 'tap': 'Spina', 'growler': 'Growler' };
            const packIcon = { 'bottle': '', 'can': '', 'tap': '', 'growler': '' };
            const prodType = beer.producer_type === 'homebrewer' ? '<span class="beer-icon" title="Homebrewer"></span>' : '<span class="beer-icon" title="Professionale"></span>';

            document.getElementById('beer-detail-container').innerHTML = `
                <div class="detail-header">
                    <h2>${beer.name}</h2>
                    <p>${prodType} ${beer.producer}</p>
                    <div style="font-size:1.1em; color:var(--primary-color); font-weight:bold;">${beer.style_name}</div>
                </div>

                <div class="detail-grid">
                    ${beer.abv ? `<div class="detail-item"><div class="label">ABV</div><div class="value">${beer.abv}%</div></div>` : ''}
                    ${beer.ibu ? `<div class="detail-item"><div class="label">IBU</div><div class="value">${beer.ibu}</div></div>` : ''}
                    ${beer.color_ebc ? `<div class="detail-item"><div class="label">Colore</div><div class="value">${beer.color_ebc} EBC</div></div>` : ''}
                    ${beer.packaging ? `<div class="detail-item"><div class="label">Pack</div><div class="value"><span class="beer-icon">${packIcon[beer.packaging]}</span> ${packMap[beer.packaging]}</div></div>` : ''}
                    ${beer.packaging_date ? `<div class="detail-item"><div class="label">Data Pack</div><div class="value">${new Date(beer.packaging_date).toLocaleDateString()}</div></div>` : ''}
                    ${beer.og ? `<div class="detail-item"><div class="label">OG</div><div class="value">${beer.og.toFixed(3)}</div></div>` : ''}
                    ${beer.fg ? `<div class="detail-item"><div class="label">FG</div><div class="value">${beer.fg.toFixed(3)}</div></div>` : ''}
                </div>
                 ${beer.yeast ? `<div style="text-align:center; margin-top:15px;"><span style="color:var(--text-muted);">Lievito:</span> <span style="font-weight:bold;">${beer.yeast}</span></div>` : ''}
                 ${beer.recipe_link ? `<div style="text-align:center; margin-top:10px;"><a href="${beer.recipe_link}" target="_blank" rel="noopener noreferrer" class="btn btn-secondary"><span class="material-symbols-outlined">link</span> Vedi Ricetta</a></div>` : ''}


                <div class="stat-box" style="margin-top:30px;">
                    <div style="font-size:0.8rem; text-transform:uppercase; color:#9ca3af; margin-bottom:5px;">Codice Condivisione</div>
                    <div class="stat-code" onclick="copySharingId('${beer.sharing_id}')" style="cursor:copy;">
                        ${beer.sharing_id} <span class="material-symbols-outlined" style="font-size:1.1rem; vertical-align:middle;">content_copy</span>
                    </div>
                    <div style="font-size:0.7rem; color:#6b7280; margin-top:5px;">Tocca per copiare</div>
                </div>
            `;

            // ... (rest of the script for loading sheets is unchanged)
            const { data: sheets, error: sheetsError } = await supabase
                .from('tasting_notes')
                .select('*')
                .eq('linked_beer_code', beer.sharing_id)
                .order('created_at', { ascending: false });

            const listDiv = document.getElementById('sheets-list');

            if (sheets && sheets.length > 0) {
                listDiv.innerHTML = '';
                sheets.forEach(sheet => {
                    const date = new Date(sheet.created_at).toLocaleDateString('it-IT');
                    let scoreBadge = `<span style="font-weight:bold; color:white; background:#4b5563; padding:2px 6px; border-radius:4px;">${sheet.final_score}</span>`;

                    if (sheet.final_score >= 38) scoreBadge = `<span style="font-weight:bold; color:white; background:#10b981; padding:2px 6px; border-radius:4px;">${sheet.final_score}</span>`;

                    const item = document.createElement('div');
                    item.style = "background:#1f2937; padding:10px; margin-bottom:10px; border-radius:6px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;";
                    item.innerHTML = `
                        <div>
                            <div style="font-weight:bold; color:#d1d5db;">Degustazione del ${date}</div>
                            <div style="font-size:0.8rem; color:#9ca3af;">Giudice: (Anonimo per ora)</div> 
                        </div>
                        ${scoreBadge}
                    `;
                    item.addEventListener('click', () => {
                        window.location.href = `dettaglio-scheda.html?id=${sheet.id}`;
                    });
                    listDiv.appendChild(item);
                });
            } else {
                listDiv.innerHTML = `<p style="text-align:center; padding:20px; color:#6b7280;">Ancora nessuna scheda ricevuta per questo codice.</p>`;
            }
        }

        loadData();
    </script>
</body>

</html>
